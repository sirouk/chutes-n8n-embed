services:
  caddy:
    image: caddy:2.11.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      n8n-net:
        aliases:
          - ${N8N_HOST}
    restart: unless-stopped

volumes:
  caddy_config:
  caddy_data:
