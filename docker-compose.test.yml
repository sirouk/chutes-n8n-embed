services:
  fake-chutes-idp:
    image: python:3.14-alpine3.23
    container_name: n8n-fake-chutes-idp
    working_dir: /app
    command: ["python", "/app/server.py"]
    environment:
      FAKE_CHUTES_CLIENT_ID: ${CHUTES_OAUTH_CLIENT_ID}
      FAKE_CHUTES_CLIENT_SECRET: ${CHUTES_OAUTH_CLIENT_SECRET}
    volumes:
      - ./tests/fake-chutes-idp:/app:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [n8n-net]
    restart: unless-stopped

  n8n:
    depends_on:
      postgres:
        condition: service_healthy
      fake-chutes-idp:
        condition: service_healthy
    environment:
      - CHUTES_IDP_BASE_URL=http://fake-chutes-idp:8080
      - CHUTES_ADMIN_USERNAMES=${CHUTES_ADMIN_USERNAMES:-admin-user}
