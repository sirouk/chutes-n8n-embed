services:
  e2ee-proxy:
    image: chutes-n8n-local-e2ee-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile.e2ee-proxy
      args:
        E2EE_PROXY_IMAGE: ${E2EE_PROXY_IMAGE:-parachutes/e2ee-proxy:latest}
    environment:
      TLS_SELF_SIGNED: "true"
      TLS_DOMAIN: ${N8N_HOST:-e2ee-local-proxy.chutes.dev}
      ALLOW_NON_CONFIDENTIAL: ${ALLOW_NON_CONFIDENTIAL:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate https://127.0.0.1/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [n8n-net]
    restart: unless-stopped

  n8n:
    depends_on:
      e2ee-proxy:
        condition: service_healthy

  caddy:
    depends_on:
      e2ee-proxy:
        condition: service_healthy
